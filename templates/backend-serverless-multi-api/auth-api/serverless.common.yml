service: __PROJECT_SLUG__-auth-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, '__AWS_REGION__'}
  stage: ${opt:stage, 'dev'}
  environment:
    PROJECT_SLUG: __PROJECT_SLUG__

functions:
  authenticate:
    handler: functions/authenticate/handler.handler
    events:
      - httpApi:
          method: POST
          path: /api/authentications
