service: __PROJECT_SLUG__-core-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, '__AWS_REGION__'}
  stage: ${opt:stage, 'dev'}
  environment:
    PROJECT_SLUG: __PROJECT_SLUG__

functions:
  health:
    handler: functions/health/handler.handler
    events:
      - httpApi:
          method: GET
          path: /api/core/health
