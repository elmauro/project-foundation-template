service: __PROJECT_SLUG__-email-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, '__AWS_REGION__'}
  stage: ${opt:stage, 'dev'}

functions:
  send:
    handler: functions/send/handler.handler
    events:
      - httpApi:
          method: POST
          path: /api/email/send
