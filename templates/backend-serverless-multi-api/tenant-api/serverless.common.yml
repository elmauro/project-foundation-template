service: __PROJECT_SLUG__-tenant-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, '__AWS_REGION__'}
  stage: ${opt:stage, 'dev'}

functions:
  health:
    handler: functions/health/handler.handler
    events:
      - httpApi:
          method: GET
          path: /api/tenants/health
