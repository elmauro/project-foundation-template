service: __PROJECT_SLUG__-worker-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, '__AWS_REGION__'}
  stage: ${opt:stage, 'dev'}

functions:
  scheduledJob:
    handler: functions/scheduledJob/handler.handler
    events:
      - schedule:
          rate: rate(1 day)
          enabled: false
