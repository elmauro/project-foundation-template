name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate frontend project
        run: test -f frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Validate build output
        run: test -f frontend/dist/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || '__AWS_REGION__' }}

      - name: Validate deploy configuration
        run: |
          test -n "${{ vars.WEB_S3_BUCKET }}"
          test -n "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"

      - name: Upload build to S3
        run: aws s3 sync frontend/dist "s3://${{ vars.WEB_S3_BUCKET }}" --delete

      - name: Verify index.html in S3
        run: aws s3api head-object --bucket "${{ vars.WEB_S3_BUCKET }}" --key index.html

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Deployment summary
        run: |
          echo "Deployed __PROJECT_SLUG__ frontend to CloudFront."
          echo "CloudFront domain: ${{ vars.CLOUDFRONT_DOMAIN_NAME }}"

