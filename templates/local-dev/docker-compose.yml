services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: __PROJECT_SLUG__
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: dynamodb,s3,ses,ssm,secretsmanager,cognito-idp
      AWS_DEFAULT_REGION: __AWS_REGION__
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  postgres-data:
  localstack-data:

